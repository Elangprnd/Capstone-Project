name: Gemini AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: Call Gemini API
        id: gemini
        run: |
          RESPONSE=$(curl -s https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GEMINI_API_KEY" \
            -d @- <<EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are a senior engineer. Review this pull request diff and give suggestions, bugs, and improvements:\n\n$(cat pr.diff)"
              }]
            }]
          }
          EOF
          )

          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const response = `${{ steps.gemini.outputs.response }}`;
            const parsed = JSON.parse(response);

            let review = "⚠️ Gemini tidak memberikan response.";
            try {
              review = parsed.candidates[0].content.parts[0].text;
            } catch (e) {}

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Gemini AI Review\n\n${review}`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
